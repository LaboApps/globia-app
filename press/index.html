<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press kit — Sovara by LocalFirst Apps</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <script>
    (function () {
      var LANGS = ['en', 'fr', 'de', 'es', 'ar'];
      var stored = localStorage.getItem('globia-lang');
      if (stored && LANGS.indexOf(stored) !== -1) { window.location.replace('/' + stored + '/press/'); return; }
      var nav = (navigator.language || navigator.userLanguage || 'en').substring(0, 2).toLowerCase();
      window.location.replace('/' + (LANGS.indexOf(nav) !== -1 ? nav : 'en') + '/press/');
    })();
  </script>
</head>
<body>
  <noscript>
    <p>Please choose your language / Choisissez votre langue :</p>
    <ul>
      <li><a href="/en/press/">English</a></li>
      <li><a href="/fr/press/">Français</a></li>
      <li><a href="/de/press/">Deutsch</a></li>
      <li><a href="/es/press/">Español</a></li>
      <li><a href="/ar/press/">العربية</a></li>
    </ul>
  </noscript>
</body>
</html>
