<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page not found · Globia</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: clamp(4rem, 10vw, 8rem); font-weight: 800; color: var(--border); line-height: 1; }
    .error-page p { color: var(--text-muted); margin: 1rem 0 2rem; }
    .error-page a { display: inline-block; color: var(--accent); font-weight: 600; border-bottom: 1px solid var(--accent); }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <p>This page doesn't exist.</p>
      <a href="/en/">Back to Globia →</a>
    </div>
  </div>
  <script src="/assets/js/app.js"></script>
</body>
</html>
