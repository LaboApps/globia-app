<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovara — Globia</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      var LANGS = ['en', 'fr', 'de', 'es', 'ar'];
      var stored = localStorage.getItem('globia-lang');
      if (stored && LANGS.indexOf(stored) !== -1) {
        window.location.replace('/' + stored + '/sovara/');
        return;
      }
      var nav = (navigator.language || navigator.userLanguage || 'en').substring(0, 2).toLowerCase();
      var target = LANGS.indexOf(nav) !== -1 ? nav : 'en';
      window.location.replace('/' + target + '/sovara/');
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/en/sovara/">
    <p>Choose your language:</p>
    <ul>
      <li><a href="/en/sovara/">English</a></li>
      <li><a href="/fr/sovara/">Français</a></li>
      <li><a href="/de/sovara/">Deutsch</a></li>
      <li><a href="/es/sovara/">Español</a></li>
      <li><a href="/ar/sovara/">العربية</a></li>
    </ul>
  </noscript>
</head>
<body>
  <p>Redirecting… <a href="/en/sovara/">Click here if not redirected.</a></p>
</body>
</html>
