<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640" role="img" aria-label="Sovara screenshot placeholder">
  <rect width="320" height="640" rx="32" fill="#161b22"/>
  <rect x="1" y="1" width="318" height="638" rx="31" fill="none" stroke="#30363d" stroke-width="2"/>
  <!-- Phone notch -->
  <rect x="120" y="12" width="80" height="8" rx="4" fill="#30363d"/>
  <!-- Lock icon -->
  <g transform="translate(140,220)">
    <rect x="4" y="18" width="32" height="24" rx="4" fill="none" stroke="#39c5cf" stroke-width="2.5"/>
    <path d="M10 18v-6a10 10 0 0 1 20 0v6" fill="none" stroke="#39c5cf" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="20" cy="30" r="3" fill="#39c5cf"/>
    <line x1="20" y1="33" x2="20" y2="38" stroke="#39c5cf" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <text x="160" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e">Sovara screenshot</text>
  <text x="160" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13" fill="#8b949e">— to come</text>
  <!-- Status bar dots -->
  <circle cx="40" cy="24" r="3" fill="#30363d"/>
  <circle cx="52" cy="24" r="3" fill="#30363d"/>
  <circle cx="64" cy="24" r="3" fill="#30363d"/>
  <!-- Home bar -->
  <rect x="120" y="620" width="80" height="4" rx="2" fill="#30363d"/>
</svg>
